name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable GitHub Pages
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/pages \
            -d '{"build_type":"workflow"}')
          http_code=$(echo "$response" | tail -n1)
          echo "GitHub Pages API response code: $http_code"
          if [[ "$http_code" == "201" ]]; then
            echo "GitHub Pages enabled successfully."
          elif [[ "$http_code" == "409" ]]; then
            echo "GitHub Pages already enabled."
          elif [[ "$http_code" == "401" ]]; then
            echo "::error::Authentication failed (401). Check that GITHUB_TOKEN has 'pages: write' permission."
            exit 1
          elif [[ "$http_code" == "403" ]]; then
            echo "::error::Permission denied (403). Ensure the workflow has 'pages: write' and the token is not restricted."
            exit 1
          else
            echo "::error::Unexpected response ($http_code) when enabling GitHub Pages. Check repository Pages settings at https://github.com/$GITHUB_REPOSITORY/settings/pages"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
